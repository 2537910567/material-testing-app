name: Build & Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller material_testing.spec
      - name: Install NSIS
        run: choco install nsis -y
      - name: Download VC Redist
        run: curl -L -o dist/MaterialTestingTool/vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe
      - name: Build NSIS installer
        run: makensis installer/installer.nsi
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: MaterialTestingTool-Setup-v*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
